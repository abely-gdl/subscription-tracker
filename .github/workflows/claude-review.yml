name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request for the Subscription Tracker project.
            The codebase has two components: a .NET 9 Minimal API (C#) and a Python MCP server.

            Steps:
            1. Get the diff by running: git diff origin/master...HEAD
            2. Read any relevant source files for additional context.
            3. Review the changes for:
               - Correctness: async/await usage, missing awaits, proper error handling
               - Validation: inputs validated before hitting the database
               - Security: no hardcoded secrets or API keys
               - Conventions: sealed classes, record DTOs, required on non-nullable strings (C#); logging module used, type hints present (Python)
               - EF Core: no N+1 queries, FindAsync used for PK lookups
            4. Write your complete review to the file /tmp/claude-review.md using the Write tool.
               Use this format:
               ## PR Review

               🔴 Critical · 🟡 Warning · 🟢 Suggestion

               (your findings grouped by severity, or "No issues found." if clean)

            Do NOT post to GitHub. Do NOT delegate to sub-agents. Perform the review directly.
          claude_args: "--max-turns 20"

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f /tmp/claude-review.md ]; then
            gh pr review --comment -F /tmp/claude-review.md
          else
            echo "No review file found — Claude did not write /tmp/claude-review.md"
          fi
