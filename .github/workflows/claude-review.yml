name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request for the Subscription Tracker project.
            The codebase has two components: a .NET 9 Minimal API (C#) and a Python MCP server.

            Check the changed files for:
            - Correctness: async/await usage, missing awaits, proper error handling
            - Validation: inputs validated before hitting the database
            - Security: no hardcoded secrets or API keys
            - Conventions: sealed classes, record DTOs, required on non-nullable strings (C#); logging module used, type hints present (Python)
            - EF Core: no N+1 queries, FindAsync used for PK lookups

            Post your findings as a PR review comment, grouped by severity:
            🔴 Critical · 🟡 Warning · 🟢 Suggestion

            If no issues found, confirm the code looks good.
          claude_args: "--max-turns 15"
