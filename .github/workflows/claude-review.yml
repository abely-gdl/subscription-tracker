name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          prompt: |
            Review this pull request for the Subscription Tracker project.
            The codebase has two components: a .NET 9 Minimal API (C#) and a Python MCP server.

            Steps:
            1. Run this exact command to get the PR diff: git diff HEAD^1...HEAD^2
            2. Read any relevant source files for additional context.
            3. Review the changes for:
               - Correctness: async/await usage, missing awaits, proper error handling
               - Validation: inputs validated before hitting the database
               - Security: no hardcoded secrets or API keys
               - Conventions: sealed classes, record DTOs, required on non-nullable strings (C#); logging module used, type hints present (Python)
               - EF Core: no N+1 queries, FindAsync used for PK lookups
            4. Write your complete review to the file "review.md" in the current working directory using the Write tool.
               Use this exact format:
               ## PR Review

               (findings grouped by 🔴 Critical · 🟡 Warning · 🟢 Suggestion, or "✅ No issues found." if clean)

            Do NOT post to GitHub directly. Do NOT delegate to sub-agents.
          claude_args: "--max-turns 20"

      - name: Post review comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f review.md ]; then
            gh pr review --comment -F review.md
          else
            echo "Claude did not write review.md"
            exit 1
          fi
